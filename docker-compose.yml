services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-CU14-ubuntu-22.04
    container_name: knjizalica-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-YourStrong@Passw0rd}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${MSSQL_SA_PASSWORD:-YourStrong@Passw0rd}" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: knjizalica-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Knjizalica.Api/Dockerfile
    container_name: knjizalica-api
    env_file:
      - .env
    environment:
      DB_CONNECTION_STRING: Server=sqlserver,1433;Database=240333;User Id=sa;Password=${MSSQL_SA_PASSWORD:-YourStrong@Passw0rd};TrustServerCertificate=True;MultipleActiveResultSets=true
      RABBITMQ_HOST: rabbitmq
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_USE_SSL: "false"
      ASPNETCORE_URLS: http://+:5000
    ports:
      - "5000:5000"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: knjizalica-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  worker:
    build:
      context: ./backend
      dockerfile: Knjizalica.Worker/Dockerfile
    container_name: knjizalica-worker
    env_file:
      - .env
    environment:
      DB_CONNECTION_STRING: Server=sqlserver,1433;Database=240333;User Id=sa;Password=${MSSQL_SA_PASSWORD:-YourStrong@Passw0rd};TrustServerCertificate=True;MultipleActiveResultSets=true
      RABBITMQ_HOST: rabbitmq
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      SMTP_USE_SSL: "false"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mailhog:
        condition: service_started

volumes:
  sqlserver_data:
